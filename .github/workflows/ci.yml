name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: dev-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Allineato a engines.node (>=22); 24 = Active LTS recente su Actions.
          node-version: '24'

      # dev-check.sh è zsh (come il resto del progetto macOS).
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      # Pure unit tests + sintassi: non serve npm install / Playwright
      # (browser.js lazy-require playwright).
      - name: Run dev-check
        run: zsh ./scripts/dev-check.sh
